<!DOCTYPE html>
<html>
<head>
    <title>Редактирование</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-4">

<h2>Редактировать клиента</h2>

<form method="POST">

<input name="name" value="{{ client[1] }}" class="form-control mb-2">
<input name="phone" value="{{ client[2] }}" class="form-control mb-2">
<input name="service" value="{{ client[3] }}" class="form-control mb-2">

<select name="status" class="form-control mb-3">
    <option {{ 'selected' if client[4]=='Новая' else '' }}>Новая</option>
    <option {{ 'selected' if client[4]=='В работе' else '' }}>В работе</option>
    <option {{ 'selected' if client[4]=='Выполнена' else '' }}>Выполнена</option>
</select>

<button class="btn btn-success">Сохранить</button>

</form>

</body>
</html>
