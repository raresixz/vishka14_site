<!DOCTYPE html>
<html>
<head>
    <title>Добавить клиента</title>
</head>
<body>

<h1>Новый клиент</h1>

<form method="POST">

    <p>Имя:</p>
    <input type="text" name="name">

    <p>Телефон:</p>
    <input type="text" name="phone">

    <p>Услуга:</p>
    <input type="text" name="service">

    <br><br>

    <button type="submit">
        Сохранить
    </button>

</form>

</body>
</html>
